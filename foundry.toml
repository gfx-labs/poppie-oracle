[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200

remappings = [
    "@pythnetwork/pyth-sdk-solidity/=lib/euler-price-oracle/lib/pyth-sdk-solidity/",
    "euler-price-oracle/=lib/euler-price-oracle/src/",
    "ethereum-vault-connector/=lib/euler-price-oracle/lib/ethereum-vault-connector/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@solady/=lib/euler-price-oracle/lib/solady/src/",
    "forge-std/=lib/forge-std/src/",
]

# Ignore NatSpec warnings in third-party (euler-price-oracle / OZ) libraries.
ignored_error_codes = [6546]

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 256
depth = 32
